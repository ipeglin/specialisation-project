# Linux/CentOS Conda Environment for TCP Preprocessing Pipeline
# Optimized for CentOS and general Linux distributions (including IDUN cluster)
#
# Setup:
#   conda env create -f environment-linux.yml
#   conda activate masters_thesis
#
# For IDUN cluster:
#   module load Anaconda3
#   conda env create -f environment-linux.yml
#   conda activate masters_thesis

name: masters_thesis
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11
  - pip

  # Core scientific computing (directly used)
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - h5py

  # Neuroimaging (directly used)
  - nilearn
  - nibabel

  # Data processing utilities
  - tqdm
  - joblib

  # Jupyter/IPython (for notebooks and development)
  - ipython
  - ipykernel
  - jupyter_core
  - jupyter_client

  # DataLad and git-annex (for dataset management)
  - datalad
  - git-annex
  - git

  # File compression (for DataLad)
  - p7zip
  - bzip2

  # Linux-specific: keyring support
  - secretstorage

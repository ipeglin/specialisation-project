# Cross-Platform Conda Environment for TCP Preprocessing Pipeline
#
# This is the minimal environment specification that works across platforms.
# For platform-specific setups, use:
#   - environment-windows.yml  (Windows 11)
#   - environment-macos.yml    (macOS Intel/ARM64)
#   - environment-linux.yml    (Linux/CentOS/IDUN cluster)
#
# Setup (generic):
#   conda env create -f environment.yml
#   conda activate masters_thesis
#
# See INSTALL.md for platform-specific installation instructions.

name: masters_thesis
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11
  - pip

  # Core scientific computing (directly used)
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - h5py

  # Neuroimaging (directly used)
  - nilearn
  - nibabel

  # Data processing utilities
  - tqdm
  - joblib

  # Jupyter/IPython (for notebooks and development)
  - ipython
  - ipykernel
  - jupyter_core
  - jupyter_client

  # DataLad and git-annex (for dataset management)
  - datalad
  - git-annex # May need manual installation on some platforms (macOS ARM64, Windows)
  - git

  # File compression (for DataLad)
  - p7zip
  - bzip2

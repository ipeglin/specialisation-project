# macOS Conda Environment for TCP Preprocessing Pipeline
# Compatible with both Intel (x86_64) and Apple Silicon (arm64)
#
# Setup:
#   conda env create -f environment-macos.yml
#   conda activate masters_thesis
#
# Note: Minimal dependencies - only what's actually used in the codebase.

name: masters_thesis
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11
  - pip

  # Core scientific computing (directly used)
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - h5py

  # Neuroimaging (directly used)
  - nilearn
  - nibabel

  # Data processing utilities
  - tqdm
  - joblib

  # Jupyter/IPython (for notebooks and development)
  - ipython
  - ipykernel
  - jupyter_core
  - jupyter_client

  # DataLad and git-annex (for dataset management)
  - datalad
  - git-annex
  - git

  # File compression (for DataLad)
  - p7zip
  - bzip2
